name: "Release"
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          path: SAELABEL.App

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: EskenderDev/SAE.STUDIO
          path: SAE.STUDIO

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies (Node)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: ./SAELABEL.App
        run: npm install

      - name: Build Server Sidecar
        working-directory: ./SAELABEL.App
        run: |
          try {
            pwsh .\scripts\build_server.ps1
          } catch {
            Write-Error "Build server failed. Diagnostic info:"
            Get-ChildItem -Recurse -Depth 2
            throw $_
          }

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './SAELABEL.App/src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: SAELABEL.App
          tagName: app-v__VERSION__
          releaseName: 'SAE.STUDIO.APP v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
